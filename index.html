<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f3ef" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141713" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="Momentum is a calm, local-first daily focus planner."
    />
    <title>Momentum · Daily focus planner</title>
    <script>
      (() => {
        try {
          const preference = localStorage.getItem("momentum-theme") || "system";
          const dark = preference === "dark" || (preference === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch { document.documentElement.dataset.theme = "light"; }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
